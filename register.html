<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Gail's Barbie Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <nav aria-label="Main Navigation">
      <ul class="nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Me</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="#" id="logoutBtn">Logout</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h1>✨ Join the Barbie Club! ✨</h1>
    <p>Create your account to get updates and exclusive content</p>
  </section>

  <div class="form-container">
    <h2>💖 Create Account</h2>
    <form id="registerForm">
      <div class="form-group">
        <label for="regName">Full Name:</label>
        <input type="text" id="regName" name="name" placeholder="Enter your full name" required>
      </div>
      
      <div class="form-group">
        <label for="regEmail">Email:</label>
        <input type="email" id="regEmail" name="email" placeholder="Enter your email" required>
      </div>
      
      <div class="form-group">
        <label for="regPassword">Password (min. 6 characters):</label>
        <input type="password" id="regPassword" name="password" placeholder="Create a password" required minlength="6">
      </div>
      
      <div class="form-group">
        <label for="regConfirmPassword">Confirm Password:</label>
        <input type="password" id="regConfirmPassword" name="confirm_password" placeholder="Confirm your password" required minlength="6">
      </div>
      
      <div class="form-group">
        <label for="regBirthday">Birthday:</label>
        <input type="date" id="regBirthday" name="birthday">
      </div>
      
      <div class="form-group">
        <label for="regFavoriteColor">Favorite Color:</label>
        <select id="regFavoriteColor" name="favorite_color">
          <option value="pink">Pink (of course!)</option>
          <option value="purple">Purple</option>
          <option value="blue">Blue</option>
          <option value="other">Other</option>
        </select>
      </div>
      
      <button type="submit" class="btn">Register 💕</button>
    </form>
    
    <p style="text-align: center; margin-top: 1rem; font-size: 1.1rem;">
      <strong>Already have an account?</strong> <a href="login.html" style="color: #ff1493; font-weight: bold; text-decoration: underline;">Click here to log in</a>
    </p>
  </div>

  <footer>
    <p>&copy; 2026 Gail Aquino | Educational Portfolio | Made with love for Barbie and pink glitter</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
